name: CI
on:
  push:
    branches: [main]
    paths:
      - "src/**"
      - "include/**"
      - "shaders/**"
      - "tests/**"
      - "probe/**"
      - "CMakeLists.txt"
      - "CMakePresets.json"
      - "cmake/**"
      - "mise.toml"
      - ".github/workflows/ci.yml"
  pull_request:
    branches: [main]
    paths:
      - "src/**"
      - "include/**"
      - "shaders/**"
      - "tests/**"
      - "probe/**"
      - "CMakeLists.txt"
      - "CMakePresets.json"
      - "cmake/**"
      - "mise.toml"
      - ".github/workflows/ci.yml"
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  build-and-test:
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: jdx/mise-action@1648a7812b9aeae629881980618f079932869151 # v4
      - name: Install MinGW + Wine
        run: |
          sudo dpkg --add-architecture i386
          sudo apt-get update -qq
          sudo apt-get install -y -qq gcc-mingw-w64-i686 g++-mingw-w64-i686 wine wine32
      - name: Init Wine prefix
        run: WINEDEBUG=-all wineboot --init
        env:
          DISPLAY: ""
      - uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5
        with:
          path: ~/.cache/CPM
          key: cpm-${{ hashFiles('CMakeLists.txt', 'cmake/**') }}
          restore-keys: cpm-
      - run: mise run build:release
      - run: mise run build
      - run: mise run test
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: PaniniWoW-${{ github.sha }}
          path: build/cross-mingw32/bin/PaniniWoW.dll
