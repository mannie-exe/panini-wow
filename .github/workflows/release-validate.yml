name: Release Validate
on:
  push:
    branches: [main]
    paths:
      - ".github/workflows/release.yml"
      - ".github/workflows/release-validate.yml"
      - "addon/**"
      - "probe/**"
      - "src/**"
      - "include/**"
      - "shaders/**"
      - "tests/**"
      - "CMakeLists.txt"
      - "CMakePresets.json"
      - "cmake/**"
      - "mise.toml"
      - "cliff.toml"
      - "VERSION"
  pull_request:
    branches: [main]
    paths:
      - ".github/workflows/release.yml"
      - ".github/workflows/release-validate.yml"
      - "addon/**"
      - "probe/**"
      - "src/**"
      - "include/**"
      - "shaders/**"
      - "tests/**"
      - "CMakeLists.txt"
      - "CMakePresets.json"
      - "cmake/**"
      - "mise.toml"
      - "cliff.toml"
      - "VERSION"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: jdx/mise-action@v4

      - name: Install MinGW + Wine
        run: |
          sudo dpkg --add-architecture i386
          sudo apt-get update -qq
          sudo apt-get install -y -qq gcc-mingw-w64-i686 g++-mingw-w64-i686 wine wine32

      - name: Init Wine prefix
        run: WINEDEBUG=-all wineboot --init
        env:
          DISPLAY: ""

      - uses: actions/cache@v5
        with:
          path: ~/.cache/CPM
          key: cpm-${{ hashFiles('CMakeLists.txt', 'cmake/**') }}
          restore-keys: cpm-

      - name: Set validation version
        run: |
          VERSION="0.0.0-ci"
          echo -n "$VERSION" > VERSION
          sed -i "s/## Version: .*/## Version: $VERSION/" addon/PaniniWoW-Classic/PaniniWoW-Classic.toc
          sed -i "s/## Version: .*/## Version: $VERSION/" addon/PaniniWoW-WotLK/PaniniWoW-WotLK.toc

      - run: mise run build:release

      - run: mise run test

      - name: Build Probe DLL
        run: |
          cmake --preset cross-mingw32 -S probe
          cmake --build probe/build/cross-mingw32

      - name: Package DLL
        run: |
          cp build/cross-mingw32/bin/PaniniWoW.dll PaniniWoW.dll
          cp probe/build/cross-mingw32/bin/Probe.dll Probe.dll

      - name: Package Classic addon
        run: |
          mkdir -p staging/PaniniWoW-Classic
          cp addon/PaniniWoW-Classic/PaniniWoW-Classic.toc staging/PaniniWoW-Classic/
          cp addon/shared/*.lua staging/PaniniWoW-Classic/
          (
            cd staging/PaniniWoW-Classic
            zip -r ../../PaniniWoW-Classic.zip \
              PaniniWoW.lua \
              PaniniWoW_Minimap.lua \
              PaniniWoW_Settings.lua \
              PaniniWoW-Classic.toc
          )

      - name: Package WotLK addon
        run: |
          mkdir -p staging/PaniniWoW-WotLK
          cp addon/PaniniWoW-WotLK/PaniniWoW-WotLK.toc staging/PaniniWoW-WotLK/
          cp addon/shared/*.lua staging/PaniniWoW-WotLK/
          (
            cd staging/PaniniWoW-WotLK
            zip -r ../../PaniniWoW-WotLK.zip \
              PaniniWoW.lua \
              PaniniWoW_Minimap.lua \
              PaniniWoW_Settings.lua \
              PaniniWoW-WotLK.toc
          )

      - name: Validate addon zips
        run: |
          unzip -Z -1 PaniniWoW-Classic.zip > classic-files.txt
          unzip -Z -1 PaniniWoW-WotLK.zip > wotlk-files.txt

          if grep -Eq '^PaniniWoW-(Classic|WotLK)/' classic-files.txt wotlk-files.txt; then
            echo "Addon zip contains a nested addon directory" >&2
            exit 1
          fi

          while read -r file; do
            grep -qx "$file" classic-files.txt
          done <<'EOF'
          PaniniWoW.lua
          PaniniWoW_Minimap.lua
          PaniniWoW_Settings.lua
          PaniniWoW-Classic.toc
          EOF

          while read -r file; do
            grep -qx "$file" wotlk-files.txt
          done <<'EOF'
          PaniniWoW.lua
          PaniniWoW_Minimap.lua
          PaniniWoW_Settings.lua
          PaniniWoW-WotLK.toc
          EOF

      - uses: actions/upload-artifact@v7
        with:
          name: release-validate-${{ github.sha }}
          path: |
            PaniniWoW.dll
            Probe.dll
            PaniniWoW-Classic.zip
            PaniniWoW-WotLK.zip
