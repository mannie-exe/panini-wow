name: Release
on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0

      - uses: jdx/mise-action@1648a7812b9aeae629881980618f079932869151 # v4

      - name: Install MinGW + Wine
        run: |
          sudo dpkg --add-architecture i386
          sudo apt-get update -qq
          sudo apt-get install -y -qq gcc-mingw-w64-i686 g++-mingw-w64-i686 wine wine32

      - name: Init Wine prefix
        run: WINEDEBUG=-all wineboot --init
        env:
          DISPLAY: ""

      - uses: actions/cache@668228422ae6a00e4ad889ee87cd7109ec5666a7 # v5
        with:
          path: ~/.cache/CPM
          key: cpm-${{ hashFiles('CMakeLists.txt', 'cmake/**') }}
          restore-keys: cpm-

      - name: Set version
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          echo -n "$VERSION" > VERSION
          sed -i "s/## Version: .*/## Version: $VERSION/" addon/PaniniWoW-Classic/PaniniWoW-Classic.toc
          sed -i "s/## Version: .*/## Version: $VERSION/" addon/PaniniWoW-WotLK/PaniniWoW-WotLK.toc

      - run: mise run build:release

      - run: mise run test

      - name: Build Probe DLL
        run: |
          cmake --preset cross-mingw32 -S probe
          cmake --build probe/build/cross-mingw32

      - name: Package DLL
        run: |
          cp build/cross-mingw32/bin/PaniniWoW.dll PaniniWoW.dll
          cp probe/build/cross-mingw32/bin/Probe.dll Probe.dll

      - name: Package Classic addon
        run: |
          mkdir -p staging/PaniniWoW-Classic
          cp addon/PaniniWoW-Classic/PaniniWoW-Classic.toc staging/PaniniWoW-Classic/
          cp addon/shared/*.lua staging/PaniniWoW-Classic/
          cd staging && zip -r ../PaniniWoW-Classic.zip PaniniWoW-Classic

      - name: Package WotLK addon
        run: |
          mkdir -p staging/PaniniWoW-WotLK
          cp addon/PaniniWoW-WotLK/PaniniWoW-WotLK.toc staging/PaniniWoW-WotLK/
          cp addon/shared/*.lua staging/PaniniWoW-WotLK/
          cd staging && zip -r ../PaniniWoW-WotLK.zip PaniniWoW-WotLK

      - uses: orhun/git-cliff-action@c93ef52f3d0ddcdcc9bd5447d98d458a11cd4f72 # v4
        id: cliff
        with:
          config: cliff.toml
          args: --latest --strip header

      - uses: softprops/action-gh-release@3bb12739c298aeb8a4eeaf626c5b8d85266b0e65 # v2
        with:
          body: ${{ steps.cliff.outputs.content }}
          files: |
            PaniniWoW.dll
            Probe.dll
            PaniniWoW-Classic.zip
            PaniniWoW-WotLK.zip
          prerelease: ${{ contains(github.ref_name, 'alpha') || contains(github.ref_name, 'beta') || contains(github.ref_name, 'rc') }}
