name: Release
on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0

      - uses: jdx/mise-action@1648a7812b9aeae629881980618f079932869151 # v4

      - name: Install MinGW + Wine
        run: |
          sudo dpkg --add-architecture i386
          sudo apt-get update -qq
          sudo apt-get install -y -qq gcc-mingw-w64-i686 g++-mingw-w64-i686 wine wine32

      - name: Init Wine prefix
        run: WINEDEBUG=-all wineboot --init
        env:
          DISPLAY: ""

      - uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5
        with:
          path: ~/.cache/CPM
          key: cpm-${{ hashFiles('CMakeLists.txt', 'cmake/**') }}
          restore-keys: cpm-

      - name: Set version
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          echo -n "$VERSION" > VERSION
          sed -i "s/## Version: .*/## Version: $VERSION/" addon/PaniniWoW-Classic/PaniniWoW-Classic.toc
          sed -i "s/## Version: .*/## Version: $VERSION/" addon/PaniniWoW-WotLK/PaniniWoW-WotLK.toc

      - run: mise run build:release

      - run: mise run test

      - name: Build Probe DLL
        run: |
          cmake --preset cross-mingw32 -S probe
          cmake --build probe/build/cross-mingw32

      - name: Package DLL
        run: |
          cp build/cross-mingw32/bin/PaniniWoW.dll PaniniWoW.dll
          cp probe/build/cross-mingw32/bin/Probe.dll Probe.dll

      - name: Package Classic addon
        run: |
          mkdir -p staging/PaniniWoW-Classic
          cp addon/PaniniWoW-Classic/PaniniWoW-Classic.toc staging/PaniniWoW-Classic/
          cp addon/shared/*.lua staging/PaniniWoW-Classic/
          (
            cd staging
            zip -r ../PaniniWoW-Classic.zip PaniniWoW-Classic
          )

      - name: Package WotLK addon
        run: |
          mkdir -p staging/PaniniWoW-WotLK
          cp addon/PaniniWoW-WotLK/PaniniWoW-WotLK.toc staging/PaniniWoW-WotLK/
          cp addon/shared/*.lua staging/PaniniWoW-WotLK/
          (
            cd staging
            zip -r ../PaniniWoW-WotLK.zip PaniniWoW-WotLK
          )

      - name: Validate addon zips
        run: |
          unzip -Z -1 PaniniWoW-Classic.zip > classic-files.txt
          unzip -Z -1 PaniniWoW-WotLK.zip > wotlk-files.txt

          if grep -Ev '^PaniniWoW-Classic/' classic-files.txt >/dev/null; then
            echo "Classic zip must contain only PaniniWoW-Classic/ entries" >&2
            exit 1
          fi

          while read -r file; do
            if ! grep -Fqx "$file" classic-files.txt; then
              echo "Missing expected file in Classic zip: $file" >&2
              exit 1
            fi
          done <<'EOF'
          PaniniWoW-Classic/
          PaniniWoW-Classic/PaniniWoW.lua
          PaniniWoW-Classic/PaniniWoW_Minimap.lua
          PaniniWoW-Classic/PaniniWoW_Settings.lua
          PaniniWoW-Classic/PaniniWoW-Classic.toc
          EOF

          if grep -Ev '^PaniniWoW-WotLK/' wotlk-files.txt >/dev/null; then
            echo "WotLK zip must contain only PaniniWoW-WotLK/ entries" >&2
            exit 1
          fi

          while read -r file; do
            if ! grep -Fqx "$file" wotlk-files.txt; then
              echo "Missing expected file in WotLK zip: $file" >&2
              exit 1
            fi
          done <<'EOF'
          PaniniWoW-WotLK/
          PaniniWoW-WotLK/PaniniWoW.lua
          PaniniWoW-WotLK/PaniniWoW_Minimap.lua
          PaniniWoW-WotLK/PaniniWoW_Settings.lua
          PaniniWoW-WotLK/PaniniWoW-WotLK.toc
          EOF

      - uses: orhun/git-cliff-action@c93ef52f3d0ddcdcc9bd5447d98d458a11cd4f72 # v4
        id: cliff
        with:
          config: cliff.toml
          args: --latest --strip header

      - uses: softprops/action-gh-release@b4309332981a82ec1c5618f44dd2e27cc8bfbfda # v3
        with:
          body: ${{ steps.cliff.outputs.content }}
          files: |
            PaniniWoW.dll
            Probe.dll
            PaniniWoW-Classic.zip
            PaniniWoW-WotLK.zip
          prerelease: ${{ contains(github.ref_name, 'alpha') || contains(github.ref_name, 'beta') || contains(github.ref_name, 'rc') }}
