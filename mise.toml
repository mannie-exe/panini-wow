[settings]
windows_default_inline_shell_args = "pwsh -NoProfile -NonInteractive -Command"

[tools]
cmake = "latest"
ninja = "latest"

[env]
CPM_SOURCE_CACHE = "~/.cache/CPM"

[tasks.clean]
description = "Remove build artifacts"
run = "rm -rf build"
run_windows = "if (Test-Path build) { Remove-Item -Recurse -Force build }"

[tasks.build]
alias = ["b", "bd"]
description = "Build debug (cross-mingw32, debug logging)"
run = """
[ -d build/cross-mingw32-debug ] || cmake --preset cross-mingw32-debug
cmake --build build/cross-mingw32-debug
"""
run_windows = """
if (-not (Test-Path build/cross-mingw32-debug)) { cmake --preset cross-mingw32-debug }
cmake --build build/cross-mingw32-debug
"""

[tasks."build:release"]
alias = "br"
description = "Build release (cross-mingw32)"
run = """
[ -d build/cross-mingw32 ] || cmake --preset cross-mingw32
cmake --build build/cross-mingw32
"""
run_windows = """
if (-not (Test-Path build/cross-mingw32)) { cmake --preset cross-mingw32 }
cmake --build build/cross-mingw32
"""

[tasks.test]
alias = "t"
description = "Run unit tests (cross-compiled, via Wine)"
depends = ["build"]
run = "WINEDEBUG=-all ctest --test-dir build/cross-mingw32-debug --output-on-failure"
run_windows = "ctest --test-dir build/cross-mingw32-debug --output-on-failure"

[tasks.shader]
description = "Compile HLSL shaders to bytecode headers"
run = """
[ -d build/cross-mingw32-debug ] || cmake --preset cross-mingw32-debug
cmake --build build/cross-mingw32-debug --target shaders
"""

[tasks.install]
description = "Copy DLL + addon to TurtleWoW"
depends = ["build"]
run = """
TURTLEWOW="${TURTLEWOW_PATH:-$HOME/production/wow/TurtleWoW}"
[ -d "$TURTLEWOW" ] || { echo "TurtleWoW not found at $TURTLEWOW"; exit 1; }
DLL=build/cross-mingw32-debug/bin/PaniniWoW.dll
[ -f "$DLL" ] || { echo "DLL not found. Run mise build first."; exit 1; }
cp "$DLL" "$TURTLEWOW/mods/PaniniWoW.dll"
mkdir -p "$TURTLEWOW/Interface/AddOns/PaniniClassicWoW"
cp PaniniClassicWoW/*.toc PaniniClassicWoW/*.lua "$TURTLEWOW/Interface/AddOns/PaniniClassicWoW/"
grep -q "mods/PaniniWoW.dll" "$TURTLEWOW/dlls.txt" 2>/dev/null || echo "NOTE: Add mods/PaniniWoW.dll to $TURTLEWOW/dlls.txt"
echo "Installed."
"""
